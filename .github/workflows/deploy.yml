name: Deploy to Vercel
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create GitHub Deployment
        id: gh_deploy
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'Production',
              production_environment: true,
              auto_merge: false,
              required_contexts: [],
              description: 'Vercel production deployment'
            });
            core.setOutput('deployment_id', deployment.data.id);
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              environment: 'Production',
              environment_url: 'https://wardlist.vercel.app',
              description: 'Deploying to Vercel...'
            });

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: vercel_deploy
        env:
          VERCEL_GIT_COMMIT_SHA: ${{ github.sha }}
          VERCEL_GIT_COMMIT_REF: ${{ github.ref_name }}
          VERCEL_GIT_COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'manual deploy' }}
          VERCEL_GIT_COMMIT_AUTHOR_NAME: ${{ github.event.head_commit.author.name || github.actor }}
          VERCEL_GIT_REPO_SLUG: wardlist
          VERCEL_GIT_REPO_OWNER: Agyeman-Enterprises
          VERCEL_GIT_PROVIDER: github
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Update GitHub Deployment Status (success)
        if: github.ref == 'refs/heads/main' && success() && steps.gh_deploy.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.gh_deploy.outputs.deployment_id }}'),
              state: 'success',
              environment: 'Production',
              environment_url: 'https://wardlist.vercel.app',
              log_url: '${{ steps.vercel_deploy.outputs.deploy_url }}',
              description: 'Deployed to Vercel production'
            });

      - name: Update GitHub Deployment Status (failure)
        if: github.ref == 'refs/heads/main' && failure() && steps.gh_deploy.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ steps.gh_deploy.outputs.deployment_id }}'),
              state: 'failure',
              environment: 'Production',
              environment_url: 'https://wardlist.vercel.app',
              description: 'Vercel deployment failed'
            });
